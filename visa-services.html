<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visa Services – Bright Institutes & Overseas</title>
    <meta name="description"
        content="Expert visa services for student, work, visit, business, and family visas to Germany, Australia, USA, UK, Canada, and Europe.">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header id="navbar" class="navbar"></header>
    <main class="page-content">

        <!-- Hero -->
        <section class="py-20 bg-primary text-white relative overflow-hidden" style="min-height:500px; display:flex; align-items:center;">
            <div class="absolute inset-0" style="background: url('assets/images/hero/hero3.jpg') center/cover no-repeat;"></div>
            <div class="absolute inset-0" style="background: radial-gradient(ellipse at top right,hsl(221,83%,53%,0.3),transparent 60%),radial-gradient(ellipse at bottom left,hsl(221,83%,53%,0.2),transparent 60%), rgba(17,24,39,0.55);"></div>
            <div class="container relative text-center">
                <span class="badge mb-4">Visa Services</span>
                <h1 class="text-4xl lg:text-6xl font-extrabold leading-tight mb-4">Complete Visa Services</h1>
                <p class="text-lg text-white-70 max-w-3xl mx-auto">Expert guidance for student, work, visit, business,
                    and family visa applications across the globe.</p>
            </div>
        </section>

        <!-- Marquee -->
        <section class="py-6 bg-primary" style="border-top:1px solid rgba(255,255,255,0.1);">
            <div class="marquee-wrapper">
                <div class="marquee-track" id="visaMarquee2"></div>
            </div>
        </section>

        <!-- Visa Categories -->
        <section class="py-20 fade-in">
            <div class="container">
                <div class="text-center mb-12">
                    <span class="badge mb-4">Our Expertise</span>
                    <h2 class="text-3xl font-extrabold">Visa Categories</h2>
                </div>
                <div class="space-y-8" id="visaCatList"></div>
            </div>
        </section>

        <!-- CTA -->
        <section class="py-20 fade-in">
            <div class="container">
                <div class="cta-rounded text-center text-white py-16 px-8">
                    <div class="glow-1"></div>
                    <div class="glow-2"></div>
                    <div class="relative" style="z-index:1;">
                        <h2 class="text-3xl lg:text-5xl font-extrabold mb-4">Need Visa Assistance?</h2>
                        <p class="text-lg text-white-70 mb-8 max-w-2xl mx-auto">Contact our visa experts today for a
                            free consultation and seamless visa processing.</p>
                        <a href="contact.html" class="btn btn-secondary btn-lg">Contact Us Now</a>
                    </div>
                </div>
            </div>
        </section>

    </main>
    <footer id="footer" class="footer"></footer>
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Marquee
            const marq = visaTypes.map(v => `<span style="display:inline-flex;align-items:center;padding:0.5rem 2rem;font-weight:600;color:rgba(255,255,255,0.7);white-space:nowrap;">${v}<span style="margin-left:2rem;color:rgba(255,255,255,0.2);">•</span></span>`).join('');
            document.getElementById('visaMarquee2').innerHTML = marq + marq;

            // Categories
            document.getElementById('visaCatList').innerHTML = visaCategories.map((cat, i) => {
                let destinationsHtml = '';
                if (cat.destinations) {
                    // Country data with flag, image, and brief
                    const countryData = {
                        'Canada': { flag: '🇨🇦', img: 'https://images.unsplash.com/photo-1503614472-8c93d56e92ce?w=400&h=250&fit=crop', brief: 'World-class education, multicultural cities, and strong immigration pathways.' },
                        'UK': { flag: '🇬🇧', img: 'https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=400&h=250&fit=crop', brief: 'Prestigious universities, rich heritage, and excellent career opportunities.' },
                        'Europe': { flag: '🇪🇺', img: 'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?w=400&h=250&fit=crop', brief: 'Affordable education, Schengen access, and diverse cultural experiences.' },
                        'Australia': { flag: '🇦🇺', img: 'https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?w=400&h=250&fit=crop', brief: 'High quality of life, post-study work rights, and vibrant student cities.' },
                        'Vietnam': { flag: '🇻🇳', img: 'https://images.unsplash.com/photo-1583417319070-4a69db38a482?w=400&h=250&fit=crop', brief: 'Emerging economy, affordable living, and growing business opportunities.' },
                        'Thailand': { flag: '🇹🇭', img: 'https://images.unsplash.com/photo-1528181304800-259b08848526?w=400&h=250&fit=crop', brief: 'Tourism hub, tropical lifestyle, and expanding international trade.' },
                        'Singapore': { flag: '🇸🇬', img: 'https://images.unsplash.com/photo-1525625293386-3f8f99389edd?w=400&h=250&fit=crop', brief: 'Global financial centre, top universities, and strategic business hub.' },
                        'Malaysia': { flag: '🇲🇾', img: 'https://images.unsplash.com/photo-1596422846543-75c6fc197f07?w=400&h=250&fit=crop', brief: 'Affordable education, multicultural society, and growing economy.' },
                        'New Zealand': { flag: '🇳🇿', img: 'https://images.unsplash.com/photo-1507699622108-4be3abd695ad?w=400&h=250&fit=crop', brief: 'Safe, welcoming environment with world-class education and stunning nature.' },
                        'Sri Lanka': { flag: '🇱🇰', img: 'https://images.unsplash.com/photo-1580674285054-bed31e145f59?w=400&h=250&fit=crop', brief: 'Rich cultural heritage, tropical beauty, and growing tourism sector.' },
                        'South Korea': { flag: '🇰🇷', img: 'https://images.unsplash.com/photo-1517154421773-0529f29ea451?w=400&h=250&fit=crop', brief: 'Tech innovation leader, K-culture capital, and advanced education system.' },
                        'Brazil': { flag: '🇧🇷', img: 'https://images.unsplash.com/photo-1483729558449-99ef09a8c325?w=400&h=250&fit=crop', brief: 'Vibrant culture, strong economy, and diverse tourism opportunities.' },
                        'Russia': { flag: '🇷🇺', img: 'https://images.unsplash.com/photo-1513326738677-b964603b136d?w=400&h=250&fit=crop', brief: 'Affordable medical education, rich history, and world-renowned universities.' },
                        'China': { flag: '🇨🇳', img: 'https://images.unsplash.com/photo-1508804185872-d7badad00f7d?w=400&h=250&fit=crop', brief: 'Global economic powerhouse with vast trade and education opportunities.' },
                        'Japan': { flag: '🇯🇵', img: 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=400&h=250&fit=crop', brief: 'Technology leader, rich traditions, and highly skilled workforce demand.' },
                        'Indonesia': { flag: '🇮🇩', img: 'https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=400&h=250&fit=crop', brief: 'Southeast Asia\'s largest economy with growing sectors and tropical lifestyle.' },
                        'Dubai': { flag: '🇦🇪', img: 'https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=400&h=250&fit=crop', brief: 'Tax-free income, luxury living, and a booming international job market.' },
                        'Bahrain': { flag: '🇧🇭', img: 'https://images.unsplash.com/photo-1559339352-11d035aa65de?w=400&h=250&fit=crop', brief: 'Financial hub of the Gulf with welcoming expat community and modern lifestyle.' },
                        'Qatar': { flag: '🇶🇦', img: 'https://images.unsplash.com/photo-1518684079-3c830dcef090?w=400&h=250&fit=crop', brief: 'High-income economy, world-class infrastructure, and strong job market.' },
                        'Oman': { flag: '🇴🇲', img: 'https://images.unsplash.com/photo-1597659840241-37e2b9c2f55f?w=400&h=250&fit=crop', brief: 'Peaceful Gulf nation with growing industries and scenic natural beauty.' },
                        'Saudi Arabia': { flag: '🇸🇦', img: 'https://images.unsplash.com/photo-1586724237569-f3d0c1dee8c6?w=400&h=250&fit=crop', brief: 'Vision 2030 driving massive job growth, modern cities, and new opportunities.' }
                    };

                    const makeCard = (name) => {
                        const d = countryData[name] || { flag: '🌍', img: '', brief: 'International destination with growing opportunities.' };
                        return `
                        <div class="dest-card">
                            <div class="dest-card-img">
                                <img src="${d.img}" alt="${name}" loading="lazy">
                                <span class="dest-card-flag">${d.flag}</span>
                            </div>
                            <div class="dest-card-body">
                                <h5 class="dest-card-name">${name}</h5>
                                <p class="dest-card-brief">${d.brief}</p>
                            </div>
                        </div>`;
                    };

                    destinationsHtml = `
                        <div class="dest-section mt-8 border-t pt-6" style="border-color:rgba(0,0,0,0.05);">
                            <div class="dest-section-header">
                                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--secondary);"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
                                <h4>Covered Destinations</h4>
                            </div>

                            <div class="dest-group">
                                <h5 class="dest-group-label">
                                    <span class="dest-group-dot" style="background:var(--secondary);"></span>
                                    Global Destinations
                                </h5>
                                <div class="dest-cards-grid">
                                    ${cat.destinations.global.map(c => makeCard(c)).join('')}
                                </div>
                            </div>

                            <div class="dest-group" style="margin-top:1.5rem;">
                                <h5 class="dest-group-label">
                                    <span class="dest-group-dot" style="background:var(--accent);"></span>
                                    Gulf Countries
                                </h5>
                                <div class="dest-cards-grid">
                                    ${cat.destinations.gulf.map(c => makeCard(c)).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                }

                return `
                <div class="card p-8 flex flex-col lg:flex-row gap-8 fade-in">
                    <div class="lg:flex-2">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="journey-step-num">${i + 1}</div>
                            <h3 class="text-2xl font-extrabold">${cat.title}</h3>
                        </div>
                        <p class="text-muted-foreground leading-relaxed">${cat.description}</p>
                        ${destinationsHtml}
                    </div>
                    <div class="lg:flex-1">
                        <div class="bg-muted p-6 rounded-xl h-full">
                            <h4 class="font-bold text-sm uppercase tracking-wider mb-4" style="color:var(--secondary);">What's Included</h4>
                            <div class="space-y-3">${cat.features.map(f => `<div class="flex items-center gap-2 text-sm"><svg class="icon-sm" style="color:hsl(142,71%,35%);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>${f}</div>`).join('')}</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            initScrollReveal();
        });
    </script>
</body>

</html>
